# -----------------------------------------------------------------------
# SonarQube / SonarCloud project configuration
#
# Fill in the values below and add the required secrets to your GitHub
# repository (Settings → Secrets and variables → Actions):
#
#   SONAR_TOKEN      — token from SonarQube / SonarCloud
#   SONAR_HOST_URL   — e.g. https://sonarcloud.io  (omit for SonarCloud default)
#
# See: https://docs.sonarsource.com/sonarqube/latest/analyzing-source-code/scanners/sonarscanner-for-github-actions/
# -----------------------------------------------------------------------

# Unique project identifier in SonarQube / SonarCloud
sonar.projectKey=cooking-code

# Human-readable project name shown in the UI
sonar.projectName=Cooking Code

# Source directory to analyse
sonar.sources=src

# Test directory
sonar.tests=src

# Patterns to exclude from analysis
sonar.exclusions=src/env.d.ts,src/content/config.ts,**/*.astro

# Test file patterns
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

# Coverage report generated by Vitest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# TypeScript tsconfig location
sonar.typescript.tsconfigPath=tsconfig.json
