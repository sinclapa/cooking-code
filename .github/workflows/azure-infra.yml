name: Azure Infrastructure

on:
  push:
    branches: [main]
    paths: [infra/**]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  secrets: write

jobs:
  provision:
    name: Provision
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group
        run: |
          az group create \
            --name cooking-code \
            --location westeurope \
            --output none

      - name: Deploy Bicep
        id: bicep
        run: |
          token=$(az deployment group create \
            --resource-group cooking-code \
            --template-file infra/main.bicep \
            --query 'properties.outputs.deploymentToken.value' \
            --output tsv)
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Store deployment token as GitHub secret
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SWA_TOKEN: ${{ steps.bicep.outputs.token }}
        run: |
          gh secret set AZURE_STATIC_WEB_APPS_API_TOKEN \
            --body "$SWA_TOKEN" \
            --repo "$GITHUB_REPOSITORY"
